    <!-- ═══════════════════════════════════════════
         STRUCTURED DATA — FAQ
         These Q&As appear as expandable rich results
         directly on Google's search page, giving you
         more real estate and higher click-through.
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What software services does FlexiLogic Africa offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FlexiLogic Africa offers web platform development, mobile app development (iOS & Android), cloud infrastructure & DevOps, AI & automation, cybersecurity, and data analytics — all tailored for businesses across Zimbabwe and Africa."
          }
        },
        {
          "@type": "Question",
          "name": "Where is FlexiLogic Africa based?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FlexiLogic Africa is based in Harare, Zimbabwe, and serves clients across the African continent."
          }
        },
        {
          "@type": "Question",
          "name": "Does FlexiLogic Africa build mobile apps?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. We build cross-platform mobile applications for iOS and Android using Flutter, as well as native apps. We have delivered apps for education, agriculture, fintech, and e-commerce clients across Africa."
          }
        },
        {
          "@type": "Question",
          "name": "How do I start a project with FlexiLogic Africa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can reach us by emailing flexilogicafrica@gmail.com, calling +263 77 255 0103, or filling in the contact form on our website at flexilogic.africa. We will schedule a discovery call to understand your needs and put together a proposal."
          }
        },
        {
          "@type": "Question",
          "name": "Can FlexiLogic Africa work with clients outside Zimbabwe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. While we are headquartered in Harare, Zimbabwe, we work with clients across Africa and internationally. We collaborate remotely and can travel for on-site engagements when required."
          }
        },
        {
          "@type": "Question",
          "name": "What technologies does FlexiLogic Africa use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our stack includes React, Next.js, Node.js, Flutter, Python, PostgreSQL, MongoDB, AWS, Google Cloud, Docker, and Kubernetes — chosen to match each client's specific needs and scale."
          }
        }
      ]
    }
    </script>
